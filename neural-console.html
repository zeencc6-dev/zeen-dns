<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Neural Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050716; --fg:#d7f4ff; --cyan:#22d3ee; --pink:#f472b6; --amber:#facc15; --violet:#a78bfa;
  --font-d:'Orbitron',sans-serif; --font-b:'Rajdhani',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:radial-gradient(ellipse at 50% 40%,#141c40 0%,#0a0e26 55%,#04061a 100%);color:var(--fg);font-family:var(--font-b);min-height:100vh;overflow-x:hidden}
main{max-width:720px;margin:0 auto;padding:24px 16px 40px}
button{background:none;border:none;color:inherit;font:inherit;cursor:pointer}

/* Workspace */
.ws{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-bottom:1px solid rgba(34,211,238,.2);padding-bottom:16px}
.ws button{display:flex;flex-direction:column;align-items:center;gap:8px}
.ws .ic{width:56px;height:56px;display:grid;place-items:center;border-radius:16px;border:1px solid rgba(34,211,238,.25);color:rgba(215,244,255,.7);transition:.25s}
.ws button.active .ic{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 20px rgba(34,211,238,.4),inset 0 0 12px rgba(34,211,238,.25)}
.ws .lb{font-family:var(--font-d);font-size:11px;letter-spacing:.25em;color:rgba(215,244,255,.7)}
.ws button.active .lb{color:var(--cyan);text-shadow:0 0 10px rgba(34,211,238,.7)}
.ws button:hover .ic{border-color:rgba(34,211,238,.6);color:var(--cyan)}

/* Tabs */
.tabs{margin-top:20px;display:flex;gap:20px;align-items:center;font-family:var(--font-d);font-size:18px;letter-spacing:.06em;overflow-x:auto;padding-bottom:4px}
.tabs .t{padding-bottom:4px;color:rgba(215,244,255,.7);white-space:nowrap;transition:.2s;border-bottom:2px solid transparent}
.tabs .t:hover{color:var(--fg)}
.tabs .t.active{color:var(--cyan);border-bottom-color:rgba(34,211,238,.8);text-shadow:0 0 10px rgba(34,211,238,.5)}
.tabs .search{margin-left:auto;display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:8px;border:1px solid rgba(120,140,180,.35);color:rgba(215,244,255,.7);font-size:15px}
.tabs .search.active{border-color:rgba(34,211,238,.5);color:var(--cyan);background:rgba(34,211,238,.06);box-shadow:0 0 18px rgba(34,211,238,.2) inset}

/* Stage */
.stage{position:relative;margin-top:16px;aspect-ratio:3/4;width:100%;overflow:hidden;border-radius:20px;border:1px solid rgba(34,211,238,.25);background:radial-gradient(ellipse at center,#0b1230 0%,#050716 75%)}
.ring{position:absolute;left:50%;top:50%;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none}
.ring.r1{width:85%;height:85%;border:1px solid rgba(34,211,238,.15);animation:spin 90s linear infinite reverse}
.ring.r2{width:60%;height:60%;border:1px solid rgba(244,114,182,.18);animation:spin 40s linear infinite}
.pulse{position:absolute;left:50%;top:50%;width:56%;height:56%;border-radius:50%;border:1px solid rgba(34,211,238,.4);transform:translate(-50%,-50%);pointer-events:none;animation:pulseRing 3s ease-out infinite}
.pulse.p2{animation-delay:1s}.pulse.p3{animation-delay:2s}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes pulseRing{0%{transform:translate(-50%,-50%) scale(.9);opacity:.7}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}

/* wires */
.wires{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.wires path{stroke-dasharray:6 8;animation:dash 2s linear infinite;fill:none;stroke-width:1;opacity:.75}
@keyframes dash{to{stroke-dashoffset:-40}}

/* brain */
.brain-wrap{position:absolute;left:50%;top:50%;width:78%;height:78%;transform:translate(-50%,-50%);transition:transform .2s ease-out}
.brain{width:100%;height:100%;animation:float 6s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(244,114,182,.4)) drop-shadow(0 0 60px rgba(34,211,238,.3))}
.brain img{width:100%;height:100%;object-fit:contain;display:block}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.03)}}

/* shards */
.shard{position:absolute;border-radius:50%;pointer-events:none}
@keyframes shard{0%{transform:translate(0,0) rotate(var(--r));opacity:0}20%{opacity:1}100%{transform:translate(var(--tx),var(--ty)) rotate(calc(var(--r) + 120deg));opacity:0}}

/* status */
.status{position:absolute;left:0;right:0;bottom:12px;text-align:center}
.status p{font-size:13px;letter-spacing:.35em;color:var(--cyan);text-shadow:0 0 10px rgba(34,211,238,.6);animation:flick 2.4s ease-in-out infinite;font-family:var(--font-d)}
.status .bar{margin:6px auto 0;height:1px;width:66%;background:linear-gradient(90deg,transparent,rgba(34,211,238,.6),transparent)}
@keyframes flick{0%,100%{opacity:.9}50%{opacity:.5}}

/* actions */
.actions{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{display:flex;align-items:center;gap:12px;padding:16px;border-radius:14px;background:rgba(14,20,50,.5);text-align:left;transition:.25s}
.card:hover{transform:translateY(-2px);filter:brightness(1.2)}
.card .ci{width:44px;height:44px;flex-shrink:0;border:1px solid currentColor;border-radius:50%;display:grid;place-items:center}
.card .ct{font-family:var(--font-d);font-weight:900;letter-spacing:.15em;font-size:17px;display:block;text-shadow:0 0 12px currentColor}
.card .cs{font-size:10px;letter-spacing:.28em;color:rgba(215,244,255,.7);display:block;margin-top:2px}
.card.cyan{border:1px solid rgba(34,211,238,.5);box-shadow:0 0 20px rgba(34,211,238,.15),inset 0 0 12px rgba(34,211,238,.08);color:var(--cyan)}
.card.pink{border:1px solid rgba(244,114,182,.55);box-shadow:0 0 20px rgba(244,114,182,.18),inset 0 0 12px rgba(244,114,182,.08);color:var(--pink)}
.card.amber{border:1px solid rgba(250,204,21,.55);box-shadow:0 0 20px rgba(250,204,21,.18),inset 0 0 12px rgba(250,204,21,.08);color:var(--amber)}

/* toast */
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);padding:10px 18px;border-radius:12px;border:1px solid rgba(34,211,238,.5);background:rgba(14,20,50,.85);color:var(--cyan);font-family:var(--font-d);font-size:12px;letter-spacing:.2em;box-shadow:0 0 20px rgba(34,211,238,.25);animation:fadeUp .5s ease-out;z-index:50;display:flex;align-items:center;gap:8px}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
svg.i{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>

    <div class="status"><p id="status">RECALLING PAST PATTERNS...</p><div class="bar"></div></div>
  </section>

  <section class="actions">
    <button class="card cyan" data-msg="Drop files to ingest">
      <span class="ci"><svg class="i" viewBox="0 0 24 24"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></span>
      <span><span class="ct">ADD FILES</span><span class="cs">MULTIDRAGAL INPUT</span></span>
    </button>
    <button class="card pink" data-msg="Memory vault opened">
      <span class="ci"><svg class="i" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span>
      <span><span class="ct">MEMORY</span><span class="cs">SYSTEM ACCESS</span></span>
    </button>
    <button class="card amber" data-msg="History timeline loaded">
      <span class="ci"><svg class="i" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l3 2"/></svg></span>
      <span><span class="ct">HISTORY</span><span class="cs">SYSTEM ACCESS</span></span>
    </button>
    <button class="card amber" data-msg="User profile ready">
      <span class="ci"><svg class="i" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></span>
      <span><span class="ct">USER</span><span class="cs">SYSTEM ACCESS</span></span>
    </button>
  </section>
</main>

<script>
// workspace
document.querySelectorAll('#ws button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#ws button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  toast('Switched to '+b.querySelector('.lb').textContent);
}));
// tabs
document.querySelectorAll('#tabs .t').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('#tabs .t').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
}));
// cards
document.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>toast(c.dataset.msg)));

// toast
let tt;
function toast(m){
  if(tt)tt.remove();
  const d=document.createElement('div');d.className='toast';
  d.innerHTML='<svg class="i" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M12 2a7 7 0 0 0-4 12.7V17a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-2.3A7 7 0 0 0 12 2z"/><path d="M9 22h6"/></svg>'+m;
  document.body.appendChild(d);tt=d;setTimeout(()=>{d.remove();tt=null},1800);
}

// status cycle
const msgs=['RECALLING PAST PATTERNS...','SYNCING NEURAL LATTICE...','INDEXING MEMORY SHARDS...','LISTENING FOR SIGNALS...'];
let si=0;setInterval(()=>{si=(si+1)%msgs.length;document.getElementById('status').textContent=msgs[si]},3200);

// shards
const colors=['#22d3ee','#f472b6','#a78bfa','#facc15','#4ade80','#fb923c','#38bdf8','#e879f9','#f87171'];
const sh=document.getElementById('shards');
for(let i=0;i<22;i++){
  const s=document.createElement('span');s.className='shard';
  const c=colors[i%colors.length],size=6+Math.random()*14;
  Object.assign(s.style,{
    top:(Math.random()*90)+'%',left:(Math.random()*95)+'%',
    width:(size/2)+'px',height:(size*1.6)+'px',
    background:`linear-gradient(180deg,${c},transparent)`,
    filter:`drop-shadow(0 0 6px ${c})`,
    animation:`shard ${5+Math.random()*5}s ease-in-out ${Math.random()*4}s infinite`
  });
  s.style.setProperty('--tx',((Math.random()-.5)*80)+'px');
  s.style.setProperty('--ty',((Math.random()-.5)*80)+'px');
  s.style.setProperty('--r',(Math.random()*360)+'deg');
  sh.appendChild(s);
}

// parallax
const stage=document.getElementById('stage'),bw=document.getElementById('brainWrap');
stage.addEventListener('mousemove',e=>{
  const r=stage.getBoundingClientRect();
  const x=((e.clientX-r.left)/r.width-.5)*2,y=((e.clientY-r.top)/r.height-.5)*2;
  bw.style.transform=`translate(calc(-50% + ${x*10}px), calc(-50% + ${y*10}px))`;
});
stage.addEventListener('mouseleave',()=>bw.style.transform='translate(-50%,-50%)');
</script>
</body>
